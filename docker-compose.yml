version: '3.8'

services:
  backend:
    build: ./server
    container_name: form-flow-backend
    ports:
      - "3001:3001"
    volumes:
      - ./server/database.sqlite:/app/database.sqlite
    environment:
      - JWT_SECRET=form_flow_secret_key_2024
      - PORT=3001
      - NODE_ENV=production
    restart: always

  frontend:
    build: .
    container_name: form-flow-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
